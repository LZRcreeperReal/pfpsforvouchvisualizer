<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Discord Chat Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>

<style>
body{
  margin:0;
  background:#190e00;
  font-family:Inter;
  color:#dbdee1;
}

nav{
  background:#1e1f22;
  padding:14px 20px;
  font-weight:600;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

button{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:6px;
  background:#5865f2;
  color:white;
  font-weight:600;
  cursor:pointer;
}

.feed{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* message */
.msg{
  display:flex;
  gap:12px;
  align-items:flex-start;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  overflow:hidden;
  background:#5865f2;
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.name{
  font-weight:600;
}

.text{
  color:#cdd0d5;
}

.tag{
  font-size:11px;
  color:#949ba4;
}
</style>
</head>

<body>

<nav>Discord Chat Generator</nav>

<div class="container">

<button onclick="generate()">Generate Chat (141 messages)</button>

<div class="feed" id="feed"></div>

</div>

<!-- DATA FILES -->
<script src="./usernames.js"></script>
<script src="./sends.js"></script>
<script src="./respondents.js"></script>

<script>

/* =========================
   PFP MANIFEST SYSTEM
========================= */

const baseURL =
"https://cdn.jsdelivr.net/gh/LZRcreeperReal/pfpsforvouchvisualizer@main";

const cache = {};

async function load(folder){
  if(cache[folder]) return cache[folder];
  const res = await fetch(`${baseURL}/${folder}/manifest.json`);
  const data = await res.json();
  cache[folder] = data;
  return data;
}

async function randomPFP(){
  const folders = ["Eboy","Egirl","Meme","Roblox"];
  const folder = folders[Math.floor(Math.random()*folders.length)];

  const files = await load(folder);
  const file = files[Math.floor(Math.random()*files.length)];

  return `${baseURL}/${folder}/${file}`;
}

/* ========================= */

function pick(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

function time(){
  return "Today at " +
    (Math.floor(Math.random()*12)+1) + ":" +
    String(Math.floor(Math.random()*60)).padStart(2,'0');
}

/* =========================
   GENERATE CHAT
========================= */

async function generate(){

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  const users = window.usernames || [];
  const sends = window.sends || [];
  const responses = window.responses || [];

  for(let i=0;i<141;i++){

    const isSender = i % 2 === 0;

    let user, text, pfp, tag;

    if(isSender){
      user = "YOU";
      text = pick(sends);
      pfp = null;
      tag = "sender";
    } else {
      user = pick(users);
      text = pick(responses);
      pfp = await randomPFP();
      tag = "respondent";
    }

    const div = document.createElement("div");
    div.className = "msg";

    div.innerHTML = `
      <div class="avatar">
        ${pfp ? `<img src="${pfp}">` : user.slice(0,2).toUpperCase()}
      </div>

      <div>
        <div class="name">${user} <span class="tag">${tag}</span></div>
        <div class="text">${text}</div>
      </div>
    `;

    feed.appendChild(div);
  }
}

</script>

</body>
</html>
