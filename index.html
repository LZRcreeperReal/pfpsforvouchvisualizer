<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vouch Visuals</title>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
:root {
  --bg: #190e00;
  --panel: #1e1f22;
  --text: #dbdee1;
  --muted: #aab0b6;
  --accent: #7c5cbf;
}

body {
  margin: 0;
  font-family: Inter;
  background: var(--bg);
  color: var(--text);
}

/* ── HEADER (Vouch Visual style) ── */
nav {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  padding: 14px 24px;
  background: rgba(30,31,34,0.85);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #2a2b30;
  font-family: Sora;
  font-weight: 700;
}

/* ── HERO ── */
.hero {
  text-align: center;
  padding: 50px 20px 30px;
}

.hero h1 {
  font-family: Sora;
  font-size: 2.6rem;
}

.hero span {
  color: #a47de0;
}

.hero p {
  color: var(--muted);
  font-size: 0.9rem;
}

/* ── CHAT AREA ── */
.feed {
  max-width: 900px;
  margin: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ── MESSAGE STYLE (Discord-like) ── */
.msg {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  background: #1a1727;
  border: 1px solid #2e2b4a;
  padding: 12px;
  border-radius: 10px;
}

.avatar {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  overflow: hidden;
  background: #7c5cbf;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  color: white;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.name {
  font-weight: 600;
}

.text {
  color: var(--muted);
  font-size: 0.9rem;
}

/* ── VOUCH SECTION SPLIT ── */
.section-title {
  margin: 20px 0 6px;
  font-size: 0.7rem;
  letter-spacing: 2px;
  color: #a47de0;
  text-transform: uppercase;
}
</style>
</head>

<body>

<nav>Vouch Visuals</nav>

<div class="hero">
  <h1>Vouch <span>Visuals</span></h1>
  <p>Automatically generated vouch showcase</p>
</div>

<div class="feed" id="feed"></div>

<script>
/* ───────── CONFIG ───────── */

const SENDER_NAME = "Huna7";
const SENDER_PFP = "./huna7pfp.png";

/* ───────── DATA ───────── */

const users = [
  "nova","kai","ghost","luna","zen","milo","echo","ray","nyx","atlas",
  "bliss","ember","frost","rune","drift","halo","lumen","storm","zero"
];

const messages = [
  "vouch legit",
  "smooth deal",
  "fast and easy",
  "no issues",
  "100% legit",
  "safe deal",
  "went smooth",
  "trustworthy",
  "all good"
];

/* ───────── UTILS ───────── */

function pick(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

/* ───────── GENERATE ───────── */

const feed = document.getElementById("feed");

const vouches = [];

for(let i = 0; i < 120; i++){

  const isSender = i % 2 === 0;

  let user, text, avatar;

  if(isSender){
    user = SENDER_NAME;
    text = "can vouch";
    avatar = SENDER_PFP;
  } else {
    user = pick(users);
    text = pick(messages);
    avatar = `https://api.dicebear.com/7.x/thumbs/svg?seed=${user}`;

    vouches.push({ user, text });
  }

  const div = document.createElement("div");
  div.className = "msg";

  div.innerHTML = `
    <div class="avatar">
      ${avatar.includes("http") || avatar.includes("png")
        ? `<img src="${avatar}">`
        : user.slice(0,2).toUpperCase()}
    </div>

    <div>
      <div class="name">${user}</div>
      <div class="text">${text}</div>
    </div>
  `;

  feed.appendChild(div);
}
</script>

</body>
</html>
