<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Discord Chat</title>

<style>
body{
  margin:0;
  background:#313338;
  font-family: Arial, sans-serif;
  color:#dbdee1;
}

/* CHAT AREA */
.feed{
  max-width: 800px;
  margin: 0 auto;
  padding: 20px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* MESSAGE ROW */
.msg{
  display:flex;
  gap:12px;
  align-items:flex-start;
}

/* AVATAR */
.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  overflow:hidden;
  background:#5865f2;
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  color:white;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* NAME */
.name{
  font-weight:600;
  font-size:14px;
}

/* TEXT */
.text{
  color:#dbdee1;
  font-size:14px;
  margin-top:2px;
}

/* MESSAGE BLOCK */
.block{
  display:flex;
  flex-direction:column;
}
</style>
</head>

<body>

<div class="feed" id="feed"></div>

<script>

/* =========================
   CONFIG
========================= */

const SENDER = "Huna7";
const SENDER_PFP = "./huna7pfp.png";

/* =========================
   DATA (same idea as before)
========================= */

const users = [
  "nova","kai","ghost","luna","zen","milo","echo","ray","nyx","atlas",
  "bliss","ember","frost","rune","drift","halo","lumen","storm","zero"
];

const messages = [
  "vouch legit",
  "smooth deal",
  "fast and easy",
  "no issues",
  "100% legit",
  "safe deal",
  "went smooth",
  "trustworthy",
  "all good"
];

const sends = [
  "yo can u vouch",
  "hey rq can u confirm",
  "yo bro can u leave vouch",
  "yo quick thing",
  "hey can u vouch for me",
  "yo u there"
];

/* =========================
   UTILS
========================= */

function pick(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

/* =========================
   GENERATE CHAT (PAIR STYLE)
========================= */

const feed = document.getElementById("feed");

for(let i = 0; i < 60; i++){

  // ---- MESSAGE 1 (Huna7) ----
  const msg1 = document.createElement("div");
  msg1.className = "msg";

  msg1.innerHTML = `
    <div class="avatar">
      <img src="${SENDER_PFP}">
    </div>

    <div class="block">
      <div class="name">${SENDER}</div>
      <div class="text">${pick(sends)}</div>
    </div>
  `;

  feed.appendChild(msg1);

  // ---- MESSAGE 2 (random user reply) ----
  const user = pick(users);
  const reply = pick(messages);

  const msg2 = document.createElement("div");
  msg2.className = "msg";

  msg2.innerHTML = `
    <div class="avatar">
      ${user.slice(0,2).toUpperCase()}
    </div>

    <div class="block">
      <div class="name">${user}</div>
      <div class="text">${reply}</div>
    </div>
  `;

  feed.appendChild(msg2);
}

</script>

</body>
</html>
