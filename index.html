<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vouch Visualiser</title>

<style>
body{
  margin:0;
  background:#1a1a1e;
  font-family: Arial, sans-serif;
  color:#dbdee1;
}

/* HEADER */
.header{
  padding:14px 20px;
  font-weight:700;
  font-size:16px;
  border-bottom:1px solid #2b2d31;
  background:#1a1a1e;
}

/* CHAT */
.feed{
  max-width:800px;
  margin:0 auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* MESSAGE */
.msg{
  display:flex;
  gap:12px;
  align-items:flex-start;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  overflow:hidden;
  background:#5865f2;
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  color:white;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.block{
  display:flex;
  flex-direction:column;
}

.name{
  font-weight:600;
  font-size:14px;
}

.text{
  font-size:14px;
  color:#dbdee1;
}

/* DIVIDER */
.divider{
  height:1px;
  background:#2b2d31;
  margin:10px 0;
}
</style>
</head>

<body>

<div class="header">Vouch Visualiser</div>

<div class="feed" id="feed"></div>

<!-- DATA FILES -->
<script src="./usernames.js"></script>
<script src="./sends.js"></script>
<script src="./respondents.js"></script>

<script>

/* =========================
   FIXED PICKER
========================= */

function pick(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

/* =========================
   SAFE DATA ACCESS
========================= */

const users = window.usernames || [];
const sends = window.sends || [];
const responses = window.responses || [];

/* fallback safety (prevents undefined bug) */
function safePick(arr, fallback){
  if(!Array.isArray(arr) || arr.length === 0) return fallback;
  return pick(arr);
}

/* =========================
   GENERATE CHAT IN PAIRS
========================= */

const feed = document.getElementById("feed");

let blocks = 20; // number of grouped sections

for(let b = 0; b < blocks; b++){

  for(let i = 0; i < 2; i++){

    /* HUNA7 MESSAGE */
    const msg1 = document.createElement("div");
    msg1.className = "msg";

    msg1.innerHTML = `
      <div class="avatar">
        HU
      </div>

      <div class="block">
        <div class="name">Huna7</div>
        <div class="text">${safePick(sends, "yo can u vouch")}</div>
      </div>
    `;

    feed.appendChild(msg1);

    /* RANDOM USER RESPONSE */
    const user = safePick(users, "user");
    const reply = safePick(responses, "vouch legit");

    const msg2 = document.createElement("div");
    msg2.className = "msg";

    msg2.innerHTML = `
      <div class="avatar">
        ${user.slice(0,2).toUpperCase()}
      </div>

      <div class="block">
        <div class="name">${user}</div>
        <div class="text">${reply}</div>
      </div>
    `;

    feed.appendChild(msg2);
  }

  /* DIVIDER BETWEEN GROUPS */
  const div = document.createElement("div");
  div.className = "divider";
  feed.appendChild(div);
}

</script>

</body>
</html>
