<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vouch Visualiser</title>

<style>
body{
  margin:0;
  background:#1a1a1e;
  font-family: Arial, sans-serif;
  color:#dbdee1;
}

/* HEADER */
.header{
  padding:14px 20px;
  font-weight:700;
  border-bottom:1px solid #2b2d31;
  background:#1a1a1e;
}

/* CHAT */
.feed{
  max-width:800px;
  margin:0 auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.msg{
  display:flex;
  gap:12px;
  align-items:flex-start;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#5865f2;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  color:white;
  flex-shrink:0;
  overflow:hidden;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.block{
  display:flex;
  flex-direction:column;
}

.name{
  font-weight:600;
  font-size:14px;
}

.text{
  font-size:14px;
  color:#dbdee1;
}

.divider{
  height:1px;
  background:#2b2d31;
  margin:6px 0;
}
</style>
</head>

<body>

<div class="header">Vouch Visualiser</div>

<div class="feed" id="feed"></div>

<!-- DATA FILES -->
<script src="./usernames.js"></script>
<script src="./sends.js"></script>
<script src="./respondents.js"></script>

<script>

/* =========================
   SAFE ACCESS (NO CRASHES)
========================= */

const users = Array.isArray(window.usernames) ? window.usernames : [];
const sends = Array.isArray(window.sends) ? window.sends : [];
const responses = Array.isArray(window.responses) ? window.responses : [];

function pick(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

/* fallback safe pick */
function safe(arr, fallback){
  if (!Array.isArray(arr) || arr.length === 0) return fallback;
  return pick(arr);
}

/* =========================
   BUILD CHAT
========================= */

const feed = document.getElementById("feed");

for(let i = 0; i < 25; i++){

  for(let j = 0; j < 2; j++){

    /* HUNA7 MESSAGE */
    const msg1 = document.createElement("div");
    msg1.className = "msg";

    msg1.innerHTML = `
      <div class="avatar">HU</div>
      <div class="block">
        <div class="name">Huna7</div>
        <div class="text">${safe(sends, "yo can u vouch")}</div>
      </div>
    `;

    feed.appendChild(msg1);

    /* RANDOM USER REPLY */
    const user = safe(users, "user");
    const reply = safe(responses, "vouch legit");

    const msg2 = document.createElement("div");
    msg2.className = "msg";

    msg2.innerHTML = `
      <div class="avatar">${user.slice(0,2).toUpperCase()}</div>
      <div class="block">
        <div class="name">${user}</div>
        <div class="text">${reply}</div>
      </div>
    `;

    feed.appendChild(msg2);
  }

  /* DIVIDER BETWEEN PAIRS */
  const div = document.createElement("div");
  div.className = "divider";
  feed.appendChild(div);
}

</script>

</body>
</html>
