<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Voucher Visual</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet"/>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

<style>
body{
  margin:0;
  background:#0f0f13;
  color:#e8e0f5;
  font-family:Inter;
}

nav{
  padding:14px 20px;
  border-bottom:1px solid #2e2b4a;
  font-family:Sora;
  font-weight:700;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

input,button{
  display:block;
  width:100%;
  margin:10px 0;
  padding:10px;
  border-radius:8px;
  border:1px solid #2e2b4a;
  background:#1a1727;
  color:white;
}

button{
  background:#7c5cbf;
  cursor:pointer;
  font-weight:600;
}

.feed{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  padding:10px;
  border-bottom:1px solid #2e2b4a;
}
</style>
</head>

<body>

<nav>Voucher Visual Builder</nav>

<div class="container">

<input id="username" placeholder="Your username"/>

<button onclick="generate()">Generate</button>
<button onclick="exportProject()">Download Deployable Site</button>

<div class="feed" id="feed"></div>

</div>

<script>
/* =========================
   SAFE INTERNAL DATA
========================= */

const usernames = [
  "saturn","clouded","vyn","mei","angelic","faded","nova","rynn",
  "ghost","frosted","voided","sleepy","lotus","haze","orbit",
  "catlawyer","breaddealer","microwave","goober","toaster"
];

const responses = [
  "yeah ur good","its fine","all good","that worked","yea i got it",
  "looks good","no issues","seems fine","all set","thx again",
  "nice","clean","perfect honestly","yeah works","it came through",
  "yep got it","all sorted","we good","its done","no problems"
];

/* ========================= */

let generatedVouches = [];

function pick(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

/* -------------------------
   GENERATE
--------------------------*/
function generate(){
  const feed = document.getElementById("feed");
  feed.innerHTML = "";
  generatedVouches = [];

  for(let i=0;i<15;i++){

    const v = {
      user: pick(usernames),
      message: pick(responses)
    };

    generatedVouches.push(v);

    const div = document.createElement("div");
    div.className = "msg";
    div.innerHTML = `<b>${v.user}</b><br>${v.message}`;
    feed.appendChild(div);
  }
}

/* -------------------------
   EXPORT (Vercel-ready ZIP)
--------------------------*/
function exportProject(){

  if(!generatedVouches.length){
    alert("Generate first");
    return;
  }

  const zip = new JSZip();

  const vercelConfig = {
    version: 2,
    builds: [
      { src: "index.html", use: "@vercel/static" }
    ]
  };

  const html = `
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voucher Visual</title>
<style>
body{
  margin:0;
  background:#0f0f13;
  color:#e8e0f5;
  font-family:Arial;
}
.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}
.msg{
  padding:10px;
  border-bottom:1px solid #2e2e2e;
}
</style>
</head>
<body>

<div class="container">

${generatedVouches.map(v => `
  <div class="msg">
    <b>${v.user}</b><br/>
    ${v.message}
  </div>
`).join("")}

</div>

</body>
</html>
`;

  zip.file("index.html", html);
  zip.file("vercel.json", JSON.stringify(vercelConfig, null, 2));

  zip.folder("Eboy");
  zip.folder("Egirl");
  zip.folder("Meme");
  zip.folder("Roblox");

  zip.generateAsync({ type: "blob" }).then(blob => {
    saveAs(blob, "voucher-visual.zip");
  });
}
</script>

</body>
</html>
