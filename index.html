<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Discord Message Builder</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg:#313338;
  --panel:#2b2d31;
  --text:#dbdee1;
  --muted:#949ba4;
  --accent:#5865f2;
}

body{
  margin:0;
  background:var(--bg);
  font-family:Inter;
  color:var(--text);
}

nav{
  background:#1e1f22;
  padding:14px 20px;
  font-weight:600;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

input,button{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:6px;
  background:#1e1f22;
  color:white;
}

button{
  background:var(--accent);
  cursor:pointer;
  font-weight:600;
}

.layout{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:20px;
}

.feed{
  background:#2b2d31;
  padding:15px;
  border-radius:8px;
  min-height:400px;
}

.msg{
  display:flex;
  gap:12px;
  margin-bottom:12px;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  overflow:hidden;
  background:var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  flex-shrink:0;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.name{
  font-weight:600;
}

.text{
  color:#cdd0d5;
}
</style>
</head>

<body>

<nav>Discord Message Builder</nav>

<div class="container">

<div class="layout">

<!-- LEFT CONTROLS -->
<div>

<input id="username" placeholder="Username"/>
<input id="message" placeholder="Message"/>

<input type="file" id="pfp"/>

<button onclick="addMessage()">Add Message</button>
<button onclick="downloadHTML()">Download Single HTML</button>

</div>

<!-- RIGHT PREVIEW -->
<div class="feed" id="feed"></div>

</div>

</div>

<script>
let messages = [];
let currentPFP = null;

/* PFP UPLOAD */
document.getElementById("pfp").addEventListener("change", e=>{
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = () => currentPFP = reader.result;
  reader.readAsDataURL(file);
});

/* ADD MESSAGE */
function addMessage(){

  const user = document.getElementById("username").value || "user";
  const text = document.getElementById("message").value || "message";

  messages.push({
    user,
    text,
    pfp: currentPFP
  });

  render();
}

/* RENDER PREVIEW */
function render(){

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  messages.forEach(m=>{
    const div = document.createElement("div");
    div.className = "msg";

    div.innerHTML = `
      <div class="avatar">
        ${m.pfp ? `<img src="${m.pfp}">` : m.user.slice(0,2).toUpperCase()}
      </div>
      <div>
        <div class="name">${m.user}</div>
        <div class="text">${m.text}</div>
      </div>
    `;

    feed.appendChild(div);
  });

}

/* EXPORT SINGLE FILE HTML */
function downloadHTML(){

const html = `
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Discord Export</title>
<style>
body{
  margin:0;
  background:#313338;
  font-family:Arial;
  color:#dbdee1;
  padding:20px;
}

.msg{
  display:flex;
  gap:12px;
  margin-bottom:12px;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  overflow:hidden;
  background:#5865f2;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  flex-shrink:0;
}

.avatar img{
  width:100%;
  height:100%;
}

.name{
  font-weight:bold;
}

.text{
  color:#cdd0d5;
}
</style>
</head>
<body>

${messages.map(m=>`
  <div class="msg">
    <div class="avatar">
      ${m.pfp ? `<img src="${m.pfp}">` : m.user.slice(0,2).toUpperCase()}
    </div>
    <div>
      <div class="name">${m.user}</div>
      <div class="text">${m.text}</div>
    </div>
  </div>
`).join("")}

</body>
</html>
`;

  const blob = new Blob([html], {type:"text/html"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "discord-export.html";
  a.click();
}

</script>

</body>
</html>
